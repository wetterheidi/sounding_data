# nginx-Vhost für tlogpviewer.wetterheidi.de
# Einzuspielen nach: /etc/nginx/sites-available/tlogpviewer.wetterheidi.de
# Aktivieren mit: ln -s /etc/nginx/sites-available/tlogpviewer.wetterheidi.de /etc/nginx/sites-enabled/
# SSL erzeugen mit: certbot --nginx -d tlogpviewer.wetterheidi.de

server {
    listen 80;
    listen [::]:80;
    server_name tlogpviewer.wetterheidi.de;

    # Certbot fügt hier automatisch den HTTPS-Redirect ein
    # (nach: certbot --nginx -d tlogpviewer.wetterheidi.de)
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name tlogpviewer.wetterheidi.de;

    # SSL – wird von Certbot automatisch eingetragen
    # ssl_certificate     /etc/letsencrypt/live/tlogpviewer.wetterheidi.de/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/tlogpviewer.wetterheidi.de/privkey.pem;
    # include             /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    root /apps/TLogPViewer/sounding_data;
    index sounding_viewer.html;

    # ---------------------------------------------------------------------------
    # Sounding-Daten (öffentlich – werden vom Viewer per JS geladen)
    # ---------------------------------------------------------------------------
    location /data/ {
        alias /apps/TLogPViewer/data/;
        add_header Cache-Control "no-cache, must-revalidate";
        add_header Access-Control-Allow-Origin "*";
        try_files $uri =404;
    }

    # ---------------------------------------------------------------------------
    # Admin-Oberfläche – geschützt per HTTP Basic Auth
    # ---------------------------------------------------------------------------
    location = /admin.html {
        auth_basic           "TLogP Admin";
        auth_basic_user_file /etc/nginx/.htpasswd-tlogp;
    }

    # ---------------------------------------------------------------------------
    # Admin-API – Proxy zur lokalen Python-API, ebenfalls per Basic Auth geschützt
    # ---------------------------------------------------------------------------
    location /api/ {
        auth_basic           "TLogP Admin";
        auth_basic_user_file /etc/nginx/.htpasswd-tlogp;

        proxy_pass         http://127.0.0.1:8765/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
    }

    # ---------------------------------------------------------------------------
    # Alles andere: statische Dateien aus dem Repo-Root ausliefern
    # ---------------------------------------------------------------------------
    location / {
        try_files $uri $uri/ =404;
    }
}
