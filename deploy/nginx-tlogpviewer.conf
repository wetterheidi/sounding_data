# nginx-Vhost für tlogpviewer.wetterheidi.de
# Einzuspielen nach: /etc/nginx/sites-available/tlogpviewer.wetterheidi.de
# Aktivieren mit: ln -s /etc/nginx/sites-available/tlogpviewer.wetterheidi.de /etc/nginx/sites-enabled/
# SSL erzeugen mit: certbot --nginx -d tlogpviewer.wetterheidi.de

server {
    listen 80;
    listen [::]:80;
    server_name tlogpviewer.wetterheidi.de;

    root /apps/TLogPViewer/sounding_data;
    index sounding_viewer.html;

    # ---------------------------------------------------------------------------
    # Sounding-Daten (öffentlich – werden vom Viewer per JS geladen)
    # ---------------------------------------------------------------------------
    location /data/ {
        alias /apps/TLogPViewer/data/;
        add_header Cache-Control "no-cache, must-revalidate";
        add_header Access-Control-Allow-Origin "*";
        try_files $uri =404;
    }

    # ---------------------------------------------------------------------------
    # Admin-Oberfläche – geschützt per HTTP Basic Auth
    # ---------------------------------------------------------------------------
    location = /admin.html {
        auth_basic           "TLogP Admin";
        auth_basic_user_file /etc/nginx/.htpasswd-wetterheidi;
    }

    # ---------------------------------------------------------------------------
    # Admin-API – Proxy zur lokalen Python-API, ebenfalls per Basic Auth geschützt
    # ---------------------------------------------------------------------------
    location /api/ {
        auth_basic           "TLogP Admin";
        auth_basic_user_file /etc/nginx/.htpasswd-wetterheidi;

        proxy_pass         http://127.0.0.1:8765/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
    }

    # ---------------------------------------------------------------------------
    # Viewer und alle statischen Dateien – geschützt per HTTP Basic Auth
    # (gleiche Credentials wie WindScope / MeteoMap)
    # ---------------------------------------------------------------------------
    location / {
        auth_basic           "wetterheidi";
        auth_basic_user_file /etc/nginx/.htpasswd-wetterheidi;
        try_files $uri $uri/ =404;
    }
}
