<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="3" fill="#0b0d12"/>
  <!-- Pressure grid lines -->
  <line x1="4" y1="8"  x2="28" y2="8"  stroke="#2a3040" stroke-width="0.6"/>
  <line x1="4" y1="16" x2="28" y2="16" stroke="#2a3040" stroke-width="0.6"/>
  <line x1="4" y1="24" x2="28" y2="24" stroke="#2a3040" stroke-width="0.6"/>
  <!-- Temperature profile (orange) -->
  <path d="M 22 28 C 18 23, 20 18, 15 13 C 12 10, 14 6, 10 3"
        stroke="#f97316" stroke-width="2.2" fill="none"
        stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Dewpoint profile (cyan) -->
  <path d="M 14 28 C 12 23, 13 18, 10 13 C 8 10, 8 6, 6 3"
        stroke="#38bdf8" stroke-width="2.2" fill="none"
        stroke-linecap="round" stroke-linejoin="round"/>
</svg>
