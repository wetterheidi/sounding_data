name: TlogP Data Fetcher

on:
  schedule:
    # ICON-D2:  Daten verfügbar ~03, 06, 09, 12, 15, 18, 21, 00 UTC
    - cron: '30 2,5,8,11,14,17,20,23 * * *'
    # ICON-EU:  Daten verfügbar ~01, 04, 07, 10, 13, 16, 19, 22 UTC
    - cron: '45 0,3,6,9,12,15,18,21 * * *'
    # ICON:     Daten verfügbar ~05, 11, 17, 23 UTC
    - cron: '00 4,10,16,22 * * *'
  workflow_dispatch:
    inputs:
      model:
        description: 'Modell-Filter (icon-d2, icon-eu, icon – leer = alle)'
        required: false
        default: ''

concurrency:
  group: "weather-data-download"
  cancel-in-progress: false

jobs:
  download-data:
    runs-on: ubuntu-latest

    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Cache für apt-Pakete (eccodes) – spart ~45 s pro Lauf
      - name: apt-Cache laden
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: apt-eccodes-${{ runner.os }}-v1

      - name: System-Abhängigkeiten (eccodes) installieren
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends libeccodes0 libeccodes-dev

      # Cache für pip – spart ~15 s pro Lauf
      - name: pip-Cache laden
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-

      - name: Python-Pakete installieren
        run: pip install --quiet requests numpy eccodes

      - name: Modell-Filter bestimmen
        id: model
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "filter=${{ github.event.inputs.model }}" >> $GITHUB_OUTPUT
          else
            case "${{ github.event.schedule }}" in
              "30 2,5,8,11,14,17,20,23 * * *") echo "filter=icon-d2" >> $GITHUB_OUTPUT ;;
              "45 0,3,6,9,12,15,18,21 * * *")  echo "filter=icon-eu" >> $GITHUB_OUTPUT ;;
              "00 4,10,16,22 * * *")            echo "filter=icon"    >> $GITHUB_OUTPUT ;;
              *)                                echo "filter="         >> $GITHUB_OUTPUT ;;
            esac
          fi

      - name: Sounding-Skript für alle Orte ausführen
        run: bash run_locations.sh "${{ steps.model.outputs.filter }}"

      - name: Index-Datei generieren
        run: |
          # Alle sounding_*.json Dateien in data/ auflisten und als JSON-Array speichern
          python3 - <<'EOF'
          import json, os, pathlib
          files = sorted(
            f.name for f in pathlib.Path('data').iterdir()
            if f.name.startswith('sounding_') and f.name.endswith('.json')
          )
          pathlib.Path('data/index.json').write_text(json.dumps(files, indent=2) + '\n')
          print(f"index.json: {len(files)} Dateien eingetragen")
          EOF

      - name: Neue JSON-Dateien ins Repository pushen
        run: |
          git config --global user.name  "GitHub Action Bot"
          git config --global user.email "action@github.com"
          # Erst pullen – --autostash sichert Arbeitsverzeichnis vor rebase und stellt es danach wieder her
          git pull --rebase --autostash origin main
          # Dann stagen (Sounding-Dateien + Index)
          git add -A ./data/
          # Frühzeitig beenden wenn nichts geändert wurde
          git diff --cached --quiet && { echo "Keine Änderungen."; exit 0; }
          git commit -m "Wetter-Update: ${{ steps.model.outputs.filter || 'alle' }} $(date -u +%Y%m%dT%H%MZ)"
          git push