name: TlogP Data Fetcher

on:
  schedule:
    # ICON-D2:  Daten verfügbar ~03, 06, 09, 12, 15, 18, 21, 00 UTC
    - cron: '30 3,6,9,12,15,18,21,0 * * *'
    # ICON-EU:  Daten verfügbar ~01, 04, 07, 10, 13, 16, 19, 22 UTC
    - cron: '30 1,4,7,10,13,16,19,22 * * *'
    # ICON:     Daten verfügbar ~05, 11, 17, 23 UTC
    - cron: '30 5,11,17,23 * * *'
  workflow_dispatch:
    inputs:
      model:
        description: 'Modell-Filter (icon-d2, icon-eu, icon – leer = alle)'
        required: false
        default: ''

concurrency:
  group: "weather-data-download"
  cancel-in-progress: false

jobs:
  download-data:
    runs-on: ubuntu-latest

    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: System-Abhängigkeiten (eccodes) installieren
        run: |
          sudo apt-get update
          sudo apt-get install -y libeccodes0 libeccodes-dev

      - name: Python-Pakete installieren
        run: |
          pip install requests numpy eccodes

      - name: Modell-Filter bestimmen
        id: model
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "filter=${{ github.event.inputs.model }}" >> $GITHUB_OUTPUT
          else
            case "${{ github.event.schedule }}" in
              "30 3,6,9,12,15,18,21,0 * * *") echo "filter=icon-d2"  >> $GITHUB_OUTPUT ;;
              "30 1,4,7,10,13,16,19,22 * * *") echo "filter=icon-eu"  >> $GITHUB_OUTPUT ;;
              "30 5,11,17,23 * * *")            echo "filter=icon"     >> $GITHUB_OUTPUT ;;
              *)                                echo "filter="          >> $GITHUB_OUTPUT ;;
            esac
          fi

      - name: Sounding-Skript für alle Orte ausführen
        run: |
          bash run_locations.sh "${{ steps.model.outputs.filter }}"

      - name: Neue JSON-Dateien ins Repository pushen
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "action@github.com"
          git add -A ./data/
          git commit -m "Automatisches Wetter-Update und Cleanup" || echo "Keine Änderungen"
          git pull --rebase origin main
          git push
