name: TlogP Data Fetcher

# Wann soll das Skript laufen?
on:
  schedule:
    # Jeden Tag um 04:30 UTC (Morgen-Lauf) und 16:30 UTC (Abend-Lauf)
    - cron: '30 4,16 * * *'
  # Erlaubt uns, das Skript auch jederzeit manuell per Knopfdruck zu starten!
  workflow_dispatch: 

jobs:
  download-data:
    runs-on: ubuntu-latest

    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: System-Abhängigkeiten (eccodes) installieren
        run: |
          sudo apt-get update
          sudo apt-get install -y libeccodes0 libeccodes-dev

      - name: Python-Pakete installieren
        run: |
          pip install requests numpy eccodes

      - name: Sounding-Skript für alle Orte ausführen
        run: |
          bash run_locations.sh

      - name: Neue JSON-Dateien ins Repository pushen
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "action@github.com"
          git add ./data/*.json
          # Wir nutzen einen Trick: Falls sich nichts geändert hat, bricht er hier nicht ab
          git commit -m "Automatisches Wetter-Update" || echo "Keine Änderungen"
          git push
